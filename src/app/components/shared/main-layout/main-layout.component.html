<mat-sidenav-container class="sidenav-container">
    <mat-sidenav #drawer class="sidenav" fixedInViewport [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
        [mode]="(isHandset$ | async) ? 'over' : 'side'" [opened]="(isHandset$ | async) === false">
        <mat-toolbar>Menu</mat-toolbar>
        <mat-nav-list>
            <a mat-list-item routerLink="/inicio" routerLinkActive="active-link"
                [routerLinkActiveOptions]="{exact: true}" (click)="drawer.close()">
                <mat-icon matListItemIcon>dashboard</mat-icon>
                <span matListItemTitle>Início</span>
            </a>
            <a *ngIf="isAdmin" mat-list-item routerLink="/settings/services" routerLinkActive="active-link"
                (click)="drawer.close()">
                <mat-icon matListItemIcon>list_alt</mat-icon>
                <span matListItemTitle>Serviços</span>
            </a>
            <a *ngIf="isAdmin" mat-list-item routerLink="/settings/professionals" routerLinkActive="active-link"
                (click)="drawer.close()">
                <mat-icon matListItemIcon>badge</mat-icon>
                <span matListItemTitle>Profissionais</span>
            </a>
            <a *ngIf="isAdmin" mat-list-item routerLink="/settings/holidays" routerLinkActive="active-link"
                (click)="drawer.close()">
                <mat-icon matListItemIcon>event_busy</mat-icon>
                <span matListItemTitle>Dias Especiais</span>
            </a>
            <a *ngIf="isAdmin" mat-list-item routerLink="/settings/products" routerLinkActive="active-link"
                (click)="drawer.close()">
                <mat-icon matListItemIcon>inventory_2</mat-icon>
                <span matListItemTitle>Produtos</span>
            </a>
            <!-- <a *ngIf="isAdmin" mat-list-item routerLink="/settings/sales" routerLinkActive="active-link"
                (click)="drawer.close()">
                <mat-icon matListItemIcon>point_of_sale</mat-icon>
                <span matListItemTitle>Vendas (PDV)</span>
            </a> -->
            <a *ngIf="isAdmin" mat-list-item routerLink="/settings/credits" routerLinkActive="active-link"
                (click)="drawer.close()">
                <mat-icon matListItemIcon>account_balance_wallet</mat-icon>
                <span matListItemTitle>Fiados</span>
            </a>
            <a *ngIf="isAdmin" mat-list-item routerLink="/settings/reports/appointments" routerLinkActive="active-link"
                (click)="drawer.close()">
                <mat-icon matListItemIcon>event_note</mat-icon>
                <span matListItemTitle>Relat. Atendimentos</span>
            </a>
            <!-- <a *ngIf="isAdmin" mat-list-item routerLink="/settings/reports/sales" routerLinkActive="active-link"
                (click)="drawer.close()">
                <mat-icon matListItemIcon>shopping_bag</mat-icon>
                <span matListItemTitle>Relat. Vendas</span>
            </a> -->
            <a *ngIf="isAdmin" mat-list-item routerLink="/settings/account" routerLinkActive="active-link"
                (click)="drawer.close()">
                <mat-icon matListItemIcon>person</mat-icon>
                <span matListItemTitle>Conta</span>
            </a>
            <mat-divider></mat-divider>
            <a mat-list-item (click)="logout()">
                <mat-icon matListItemIcon>logout</mat-icon>
                <span matListItemTitle>Sair</span>
            </a>
        </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
        <mat-toolbar color="primary" class="main-toolbar">
            <div class="toolbar-content">
                <button type="button" aria-label="Toggle sidenav" mat-icon-button (click)="drawer.toggle()">
                    <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
                </button>
                <span class="toolbar-title">ZenReserve</span>
            </div>
        </mat-toolbar>

        <div class="content-body">
            <router-outlet></router-outlet>
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>

<app-ios-install-tutorial></app-ios-install-tutorial>

<button class="install-button" *ngIf="pwaService.showInstallButton()" (click)="pwaService.installPwa()">
    Instalar App
</button>
