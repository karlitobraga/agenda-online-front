<div class="setup-container">
    <!-- Header -->
    <div class="setup-header">
        <h1>Configuração Inicial</h1>
        <p>Siga os passos abaixo para preparar sua barbearia</p>
    </div>

    <!-- Progress Stepper -->
    <div class="progress-stepper">
        <div class="step" [class.active]="currentStep === 'services'" [class.completed]="isStepCompleted('services')">
            <div class="step-indicator">
                <mat-icon>{{ isStepCompleted('services') ? 'check' : 'content_cut' }}</mat-icon>
            </div>
            <span class="step-label">Serviços</span>
        </div>
        <div class="step-connector" [class.completed]="isStepCompleted('services')"></div>

        <div class="step" [class.active]="currentStep === 'professionals'"
            [class.completed]="isStepCompleted('professionals')">
            <div class="step-indicator">
                <mat-icon>{{ isStepCompleted('professionals') ? 'check' : 'badge' }}</mat-icon>
            </div>
            <span class="step-label">Equipe</span>
        </div>
        <div class="step-connector" [class.completed]="isStepCompleted('professionals')"></div>

        <div class="step" [class.active]="currentStep === 'whatsapp'" [class.completed]="isStepCompleted('whatsapp')">
            <div class="step-indicator">
                <mat-icon>{{ isStepCompleted('whatsapp') ? 'check' : 'qr_code_2' }}</mat-icon>
            </div>
            <span class="step-label">WhatsApp</span>
        </div>
    </div>

    <!-- Step Content -->
    <div class="step-content">
        <app-services *ngIf="currentStep === 'services'" [showBackButton]="false" (completed)="onServicesCompleted()">
        </app-services>

        <app-setup-professionals *ngIf="currentStep === 'professionals'" (completed)="onProfessionalsCompleted()"
            (back)="onProfessionalsBack()">
        </app-setup-professionals>

        <app-qr-code *ngIf="currentStep === 'whatsapp'" [showBackButton]="true" (connected)="onWhatsappCompleted()"
            (back)="onWhatsappBack()">
        </app-qr-code>
    </div>
</div>
